{% extends "base.html" %}
{% block content %}
{% if message %}<div class="notice">{{ message }}</div>{% endif %}

<section class="card">
    <form method="get" class="toolbar__form">
        <label>Загрузить упражнение</label>
        <select name="exercise">
            {% for name in exercise_names %}<option value="{{ name }}" {% if name == selected_name %}selected{% endif %}>{{ name }}</option>{% endfor %}
        </select>
        <button type="submit">Открыть</button>
    </form>
</section>

<section class="card">
    <h2>Редактор упражнения</h2>
    <form method="post">
        <div class="form-grid">
            <label>Название
                <input type="text" name="exercise_name" value="{{ selected_row['exercise'] if selected_row else selected_name }}" required>
            </label>
            <label>difficulty_coeff
                <input type="number" name="difficulty_coeff" step="0.01" value="{{ selected_row['difficulty_coeff'] if selected_row else 1 }}">
            </label>
        </div>

        <h3>Распределение по мышцам</h3>
        <div class="muscle-grid">
            {% for column in muscle_cols %}
                <label>{{ column }}
                    <input type="number" name="muscle__{{ column }}" step="0.01" value="{{ selected_row[column] if selected_row else 0 }}">
                </label>
            {% endfor %}
        </div>
        <div class="form-actions"><button type="submit">Сохранить упражнение</button></div>
    </form>
</section>
{% endblock %}
